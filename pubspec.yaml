  lottie: ^3.3.3
  flutter_confetti: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.14.0

flutter:
  uses-material-design: true
