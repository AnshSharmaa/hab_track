name: hab_track
description: "Habit Tracker App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  shadcn_ui: ^0.54.0
  flutter_riverpod: ^3.3.1    # Riverpod 3.0 style; check latest
  drift: ^2.31.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  fl_chart: ^1.2.0
